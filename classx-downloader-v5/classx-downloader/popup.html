<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e2e2f0;
      padding: 18px;
    }
    .logo {
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2px;
    }
    .version { font-size: 10px; color: #6b7280; margin-bottom: 14px; }
    .card {
      background: #1a1a2e;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      color: #aab;
      line-height: 1.7;
      border: 1px solid #2a2a3e;
      margin-bottom: 10px;
    }
    .card span { color: #a78bfa; font-weight: 600; }
    .steps { font-size: 11px; color: #95a0b3; line-height: 1.9; }
    .steps b { color: #6c63ff; }
    .badge {
      display: inline-block;
      background: #1e1b4b;
      border: 1px solid #4f46e5;
      color: #a78bfa;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 10px;
    }
    .credit {
      margin-top: 12px;
      font-size: 11px;
      color: #8b8fa8;
      line-height: 1.6;
    }
    .credit a {
      color: #93c5fd;
      text-decoration: none;
    }
    .credit a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="logo">ClassX Downloader</div>
  <div class="version">v5.0 - PDF tools</div>
  <div class="card">
    Open any <span>ClassX lecture</span> with PDF notes.<br>
    Use <span>Download PDF</span> or <span>Page Toggles</span>.
  </div>
  <div class="steps">
    <b>Steps:</b><br>
    1. Go to course -> click a lecture<br>
    2. Wait for PDF to load<br>
    3. Click the extension button
  </div>
  <div class="badge">Works on Brave, Chrome, Edge</div>
  <div class="credit">
    Built by <b>@vishuXdev</b><br>
    <a href="https://vishalgupta.dev" target="_blank" rel="noopener noreferrer">vishalgupta.dev</a>
  </div>
</body>
</html>
